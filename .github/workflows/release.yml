name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      # Needed by the aggregate-tag step: `gh label create` (issues) and
      # `gh pr edit --add-label` (pull-requests). Without these, both calls
      # fail silently under `|| true` — the label never gets created and no
      # PRs get tagged with the vX.Y.Z marker.
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so the aggregate-tag step can resolve
          # `PREV_TAG` and walk `git log PREV_TAG..HEAD` to find every PR
          # merged in this release window. Default shallow clone yields one
          # commit, so only the triggering merge gets labeled.
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Node 24 ships with npm 11.x, which already satisfies Trusted Publishing's
      # >= 11.5.1 requirement — no manual upgrade step needed.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect packages with new versions
        id: detect
        run: |
          node <<'EOF' > /tmp/publish.json
          const { execSync } = require('child_process');
          const PUBLISHABLE = ['effect-dynamodb', '@effect-dynamodb/geo', '@effect-dynamodb/language-service'];
          const workspace = JSON.parse(execSync('pnpm -r list --depth -1 --json', { encoding: 'utf8' }));
          const toPublish = [];
          for (const name of PUBLISHABLE) {
            const entry = workspace.find((p) => p.name === name);
            if (!entry) {
              console.error(`Workspace package not found: ${name}`);
              process.exit(1);
            }
            const current = entry.version;
            let published = '0.0.0';
            try {
              published = execSync(`npm view ${name}@latest version`, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'ignore'] }).trim() || '0.0.0';
            } catch { /* not yet published */ }
            if (current !== published) {
              console.error(`${name}: ${published} -> ${current} (will publish)`);
              toPublish.push({ name, version: current, dir: entry.path });
            } else {
              console.error(`${name}: ${current} already published, skipping`);
            }
          }
          process.stdout.write(JSON.stringify(toPublish));
          EOF
          COUNT=$(node -p "require('/tmp/publish.json').length")
          if [ "$COUNT" = "0" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.detect.outputs.should_publish == 'true'
        run: pnpm build

      - name: Test
        if: steps.detect.outputs.should_publish == 'true'
        run: pnpm test

      # Authentication uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
      # Each package must be configured at npmjs.com with this repo + workflow as a trusted publisher.
      - name: Publish to NPM
        if: steps.detect.outputs.should_publish == 'true'
        run: |
          node <<'EOF'
          const { execSync } = require('child_process');
          const targets = require('/tmp/publish.json');
          for (const { name, version, dir } of targets) {
            console.log(`Publishing ${name}@${version} from ${dir}`);
            execSync('npm publish --provenance --access public', { cwd: dir, stdio: 'inherit' });
          }
          EOF

      - name: Create per-package GitHub Releases
        if: steps.detect.outputs.should_publish == 'true'
        run: |
          for ROW in $(node -e "for (const t of require('/tmp/publish.json')) console.log(t.name + '@' + t.version)"); do
            git tag "$ROW"
            git push origin "$ROW"
            gh release create "$ROW" --title "$ROW" --generate-notes
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # When all three lockstep packages bump to the same version, also cut a
      # single aggregate vX.Y.Z tag + release and label every PR merged into
      # this release window with vX.Y.Z for downstream traceability.
      - name: Create aggregate vX.Y.Z tag, release, and PR labels
        if: steps.detect.outputs.should_publish == 'true'
        run: |
          AGG_VER=$(node -e "
            const PUBLISHABLE = ['effect-dynamodb', '@effect-dynamodb/geo', '@effect-dynamodb/language-service'];
            const targets = require('/tmp/publish.json');
            const byName = Object.fromEntries(targets.map(t => [t.name, t.version]));
            const allPresent = PUBLISHABLE.every(n => byName[n]);
            const versions = new Set(PUBLISHABLE.map(n => byName[n]));
            if (allPresent && versions.size === 1) process.stdout.write([...versions][0]);
          ")
          if [ -z "$AGG_VER" ]; then
            echo "Not a lockstep bump across all three packages; skipping aggregate tag."
            exit 0
          fi
          AGG_TAG="v$AGG_VER"
          echo "Aggregate release tag: $AGG_TAG"

          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -vx "$AGG_TAG" | head -1 || true)
          echo "Previous aggregate tag: ${PREV_TAG:-<none>}"

          # Annotated tags require a committer identity; runners don't have one
          # by default. Use the GitHub Actions bot identity.
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$AGG_TAG" -m "$AGG_TAG"
          git push origin "$AGG_TAG"

          if [ -n "$PREV_TAG" ]; then
            gh release create "$AGG_TAG" --title "$AGG_TAG" --generate-notes --notes-start-tag "$PREV_TAG"
            RANGE="$PREV_TAG..HEAD"
          else
            gh release create "$AGG_TAG" --title "$AGG_TAG" --generate-notes
            RANGE="HEAD"
          fi

          gh label create "$AGG_TAG" --color 0366d6 --description "Shipped in $AGG_TAG" 2>/dev/null || true

          git log --pretty=%H "$RANGE" | while read SHA; do
            gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[].number' 2>/dev/null || true
          done | sort -u | while read PR; do
            if [ -n "$PR" ]; then
              echo "Labeling PR #$PR with $AGG_TAG"
              gh pr edit "$PR" --add-label "$AGG_TAG" || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
