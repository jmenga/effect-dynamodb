name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -sSf -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -qE '^(200|400|404)$'; then
              echo "DynamoDB Local is reachable"
              exit 0
            fi
            echo "Waiting for DynamoDB Local... ($i/30)"
            sleep 1
          done
          echo "DynamoDB Local did not become reachable in time"
          exit 1

      - name: Integration tests (connected)
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
        run: pnpm -r --if-present test:connected

      - name: Build
        run: pnpm build

      - name: Require changeset or version bump
        run: |
          # Pass if there's a changeset file (any *.md other than README.md)
          HAS_CHANGESET=false
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            EXTRA=$(ls .changeset/*.md | grep -v '/README.md$' || true)
            if [ -n "$EXTRA" ]; then HAS_CHANGESET=true; fi
          fi

          # Or if a publishable package's version differs from base branch
          HAS_VERSION_BUMP=false
          git fetch origin ${{ github.base_ref }} --depth=1
          for PKG_FILE in packages/effect-dynamodb/package.json packages/effect-dynamodb-geo/package.json packages/language-service/package.json; do
            CURRENT=$(node -p "require('./$PKG_FILE').version")
            BASE=$(git show origin/${{ github.base_ref }}:$PKG_FILE 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{process.stdout.write(JSON.parse(d).version)}catch{process.stdout.write('')}})")
            if [ -n "$BASE" ] && [ "$CURRENT" != "$BASE" ]; then
              echo "Version bump in $PKG_FILE: $BASE -> $CURRENT"
              HAS_VERSION_BUMP=true
            fi
          done

          if [ "$HAS_CHANGESET" = "true" ]; then
            echo "Changeset found"
          elif [ "$HAS_VERSION_BUMP" = "true" ]; then
            echo "Version bump detected"
          else
            echo "::error::No changeset found. Run 'pnpm changeset' and commit the generated file."
            exit 1
          fi
