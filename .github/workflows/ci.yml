name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build must run before `check` and `test` — @effect-dynamodb/geo imports
      # `effect-dynamodb` as a workspace dependency that resolves to
      # `dist/index.d.ts`. Without a build, `tsc` can't find the types and the
      # check step fails with TS2307 on a fresh checkout.
      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -sSf -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -qE '^(200|400|404)$'; then
              echo "DynamoDB Local is reachable"
              exit 0
            fi
            echo "Waiting for DynamoDB Local... ($i/30)"
            sleep 1
          done
          echo "DynamoDB Local did not become reachable in time"
          exit 1

      - name: Integration tests (connected)
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
        run: pnpm -r --if-present test:connected

      # Enforce Option A (see CLAUDE.md > Release Workflow): any PR declaring a
      # release must run `pnpm changeset version` as part of that same PR, so
      # the changeset is consumed and package.json versions are bumped in the
      # PR itself — not in a follow-up bot PR. Empty chore changesets (no
      # packages listed) are fine and are allowed through.
      - name: Enforce changeset-version consumption
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const dir = '.changeset';
          const files = fs.existsSync(dir)
            ? fs.readdirSync(dir).filter((f) => f.endsWith('.md') && f !== 'README.md')
            : [];

          const pending = [];
          for (const f of files) {
            const raw = fs.readFileSync(path.join(dir, f), 'utf8');
            // Extract frontmatter between the first pair of `---` lines.
            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---/);
            if (!match) continue;
            const body = match[1];
            // A release-declaring line looks like: "pkg-name": patch|minor|major
            const hasRelease = /^"[^"]+"\s*:\s*(patch|minor|major)\s*$/m.test(body);
            if (hasRelease) pending.push(f);
          }

          if (pending.length > 0) {
            console.error('::error::Unconsumed release-declaring changesets found:');
            for (const f of pending) console.error(`::error::  .changeset/${f}`);
            console.error(
              '::error::Per CLAUDE.md > Release Workflow, every PR that bumps a release must run ' +
                "'pnpm changeset version' as part of that same PR. Run it locally and commit the " +
                'result (bumped package.json versions, regenerated CHANGELOG.md, deleted changeset) ' +
                'before merging.',
            );
            process.exit(1);
          }
          EOF

      - name: Require changeset or version bump
        run: |
          # Pass if there's a changeset file (any *.md other than README.md).
          # The step above has already confirmed none of them declare an
          # unconsumed release.
          HAS_CHANGESET=false
          if ls .changeset/*.md 1>/dev/null 2>&1; then
            EXTRA=$(ls .changeset/*.md | grep -v '/README.md$' || true)
            if [ -n "$EXTRA" ]; then HAS_CHANGESET=true; fi
          fi

          # Or if a publishable package's version differs from base branch
          HAS_VERSION_BUMP=false
          git fetch origin ${{ github.base_ref }} --depth=1
          for PKG_FILE in packages/effect-dynamodb/package.json packages/effect-dynamodb-geo/package.json packages/language-service/package.json; do
            CURRENT=$(node -p "require('./$PKG_FILE').version")
            BASE=$(git show origin/${{ github.base_ref }}:$PKG_FILE 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{process.stdout.write(JSON.parse(d).version)}catch{process.stdout.write('')}})")
            if [ -n "$BASE" ] && [ "$CURRENT" != "$BASE" ]; then
              echo "Version bump in $PKG_FILE: $BASE -> $CURRENT"
              HAS_VERSION_BUMP=true
            fi
          done

          if [ "$HAS_CHANGESET" = "true" ]; then
            echo "Changeset found"
          elif [ "$HAS_VERSION_BUMP" = "true" ]; then
            echo "Version bump detected"
          else
            echo "::error::No changeset found. Run 'pnpm changeset' and commit the generated file."
            exit 1
          fi
